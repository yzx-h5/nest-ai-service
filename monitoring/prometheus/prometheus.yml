global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nest-ai-service
    metrics_path: /metrics
    static_configs:
      - targets: ['app:3000']
        labels:
          service: nest-ai-service
          env: docker

  - job_name: nest-ai-service-local
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: nest-ai-service
          env: local
